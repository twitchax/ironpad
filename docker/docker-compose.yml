services:
  ironpad:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3111:3111"
    volumes:
      - notebooks:/data
      - cache:/cache
    environment:
      - IRONPAD_DATA_DIR=/data
      - IRONPAD_CACHE_DIR=/cache
      - IRONPAD_PORT=3111
      - IRONPAD_CELL_PATH=/app/crates/ironpad-cell
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  notebooks:
  cache:
